name: Release macOS app

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: scenepilot-macos-release
  cancel-in-progress: true

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Set release version
        env:
          RELEASE_VERSION: 0.1.${{ github.run_number }}
        run: node -e 'const fs=require("fs"); const file="electron/package.json"; const pkg=JSON.parse(fs.readFileSync(file)); pkg.version=process.env.RELEASE_VERSION; fs.writeFileSync(file, JSON.stringify(pkg, null, 2)+"\n");'
      - run: npm test
      - run: npm run desktop:dist
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: 0.1.${{ github.run_number }}
        run: |
          shasum -a 256 "release/ScenePilot-${RELEASE_VERSION}-arm64.dmg" > "release/ScenePilot-${RELEASE_VERSION}-arm64.dmg.sha256"
          gh release create "v${RELEASE_VERSION}" \
            "release/ScenePilot-${RELEASE_VERSION}-arm64.dmg" \
            "release/ScenePilot-${RELEASE_VERSION}-arm64.dmg.sha256" \
            --title "ScenePilot ${RELEASE_VERSION}" \
            --notes "Automatic Apple Silicon build from main at ${GITHUB_SHA}."
